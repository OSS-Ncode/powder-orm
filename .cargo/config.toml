# musl targets default to static CRT, which blocks cdylib output. Turn it off so
# powder-ffi / powder-java build shared libraries (.so) for Alpine/musl.
# napi/maturin set their own RUSTFLAGS (which override these), so only the raw
# `cargo build` in the native-libs job is affected.
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=-crt-static"]
