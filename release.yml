name: Release

# Runs on every push, but the whole job is gated on the commit message
# containing "[RELEASE]" (see the job-level `if` below) so ordinary commits
# don't spend self-hosted runner time.
on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  release:
    if: contains(github.event.head_commit.message, '[RELEASE]')
    runs-on: [self-hosted, macOS, ARM64]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Put cargo on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Toolchain versions
        run: |
          rustc --version
          cargo --version
          node --version
          python3 --version

      - name: Clippy (warnings fail the build)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

      - name: Build ncode-core (release)
        run: cargo build --release -p ncode-core

      - name: Build Node native addon
        working-directory: crates/ncode-node
        run: |
          npm ci
          npm run build

      - name: Build Python wheel
        working-directory: crates/ncode-python
        run: |
          python3 -m pip install --upgrade pip maturin
          maturin build --release

      - name: Read release version from Cargo.toml
        id: version
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Stage release artifacts
        run: |
          mkdir -p dist
          cp crates/ncode-node/index.*.node dist/
          cp target/wheels/*.whl dist/
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/*
